version: "3.8"

networks:
  postgres_net:
    name: postgres_net
    driver: bridge

services:
  db:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - /volume1/docker/postgres/data:/var/lib/postgresql/data
    networks:
      - postgres_net
    ports:
      - "5432:5432"          # Keep it if you want to connect from other tools